<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- interactive-widget=resizes-content tells Chrome Android (108+) and
         iOS Safari (16.4+) to shrink the *layout* viewport when the
         keyboard opens, so 100dvh and flex layouts naturally adapt without
         any JS gymnastics. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, interactive-widget=resizes-content"
    />
    <title>Ooh La Langue — French conversation practice</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%231a1a2e'/><text x='50%' y='54%' font-family='Playfair Display, serif' font-size='40' font-weight='700' text-anchor='middle' dominant-baseline='middle' fill='%23f5c842'>O</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Playfair+Display:ital,wght@0,600;0,700;1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #1a1a2e;
        --panel: #22223a;
        --panel-2: #2a2a45;
        --gold: #f5c842;
        --coral: #ff8c69;
        --green: #7bd88f;
        --text: #f1f1f5;
        --muted: #a0a0b8;
        --bubble-teacher: #2e2e4d;
        --bubble-student: #3a2e4d;
        --border: rgba(255, 255, 255, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        /* Lock the document itself so iOS Safari can't scroll the page
           when the keyboard opens (which was pushing the teacher's
           question above the visible area). */
        overflow: hidden;
        overscroll-behavior: none;
        background: var(--bg);
        color: var(--text);
        font-family: 'DM Sans', system-ui, -apple-system, Segoe UI, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .app {
        display: flex;
        flex-direction: column;
        /* Progressive fallbacks: 100vh for old browsers, 100dvh for modern,
           then --vvh set from window.visualViewport.height so the layout
           tracks the *visual* viewport exactly on iOS when the keyboard
           opens/closes. */
        height: 100vh;
        height: 100dvh;
        height: var(--vvh, 100dvh);
        max-width: 820px;
        margin: 0 auto;
        padding: 20px 16px 12px;
      }

      header {
        text-align: center;
        padding: 8px 0 18px;
        border-bottom: 1px solid var(--border);
      }

      .logo {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        font-size: 42px;
        letter-spacing: 0.5px;
        color: var(--gold);
        margin: 0;
        line-height: 1.1;
      }

      .logo .accent {
        color: var(--coral);
        font-style: italic;
      }

      .tagline {
        margin-top: 8px;
        font-size: 14px;
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .badge {
        background: rgba(245, 200, 66, 0.12);
        color: var(--gold);
        border: 1px solid rgba(245, 200, 66, 0.35);
        border-radius: 999px;
        padding: 3px 10px;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.3px;
      }

      #chat {
        flex: 1;
        /* min-height: 0 lets this flex child shrink below its content size,
           which is what actually allows the inner overflow-y: auto to kick
           in on mobile WebKit. Without it, long correction cards push the
           composer off-screen and the top of the chat becomes unreachable. */
        min-height: 0;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 20px 4px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        scroll-behavior: smooth;
      }

      /* With only a couple of messages, push them toward the composer so the
         latest question sits just above the keyboard. Using margin-top: auto
         on the first row (instead of justify-content: flex-end on the flex
         container) preserves normal scrollback when content overflows. */
      #chat > :first-child {
        margin-top: auto;
      }

      #chat::-webkit-scrollbar {
        width: 8px;
      }
      #chat::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 8px;
      }

      .row {
        display: flex;
        gap: 10px;
        align-items: flex-end;
        max-width: 90%;
      }

      .row.teacher {
        align-self: flex-start;
      }

      .row.student {
        align-self: flex-end;
        flex-direction: row-reverse;
      }

      .avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--panel-2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
        border: 1px solid var(--border);
      }

      .bubble {
        background: var(--bubble-teacher);
        padding: 12px 16px;
        border-radius: 18px;
        border: 1px solid var(--border);
        line-height: 1.5;
        font-size: 15px;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      .row.teacher .bubble {
        border-bottom-left-radius: 4px;
      }

      .row.student .bubble {
        background: var(--bubble-student);
        border-bottom-right-radius: 4px;
      }

      .correction {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        margin-top: 8px;
      }

      .correction .section {
        display: flex;
        gap: 10px;
        padding: 10px 14px;
        align-items: flex-start;
        font-size: 14.5px;
        line-height: 1.5;
        border-top: 1px solid var(--border);
      }

      .correction .section:first-child {
        border-top: none;
      }

      .correction .section .icon {
        font-size: 16px;
        margin-top: 1px;
      }

      .correction .good {
        background: rgba(123, 216, 143, 0.08);
        color: var(--green);
      }

      .correction .fix {
        background: rgba(255, 140, 105, 0.08);
        color: var(--coral);
      }

      .correction .corrected {
        background: rgba(245, 200, 66, 0.08);
        color: var(--gold);
        font-style: italic;
      }

      .correction .label {
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-size: 11px;
        opacity: 0.8;
        margin-right: 6px;
      }

      .intro {
        margin-bottom: 2px;
      }

      .question {
        margin-top: 10px;
        font-weight: 500;
      }

      .typing {
        display: inline-flex;
        gap: 4px;
        align-items: center;
        padding: 14px 16px;
      }

      .typing span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
        animation: blink 1.3s infinite ease-in-out;
      }

      .typing span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes blink {
        0%, 80%, 100% {
          opacity: 0.3;
          transform: scale(0.85);
        }
        40% {
          opacity: 1;
          transform: scale(1);
        }
      }

      form {
        display: flex;
        gap: 10px;
        padding: 12px 4px 4px;
        border-top: 1px solid var(--border);
        align-items: flex-end;
      }

      textarea {
        flex: 1;
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 14px;
        padding: 12px 14px;
        font-family: inherit;
        /* 16px prevents iOS Safari from auto-zooming the viewport on focus,
           which otherwise pushes the chat around when the keyboard opens. */
        font-size: 16px;
        line-height: 1.4;
        resize: none;
        min-height: 46px;
        max-height: 160px;
        outline: none;
        transition: border-color 0.15s ease;
      }

      textarea:focus {
        border-color: rgba(245, 200, 66, 0.45);
      }

      button.send {
        background: var(--gold);
        color: #1a1a2e;
        border: none;
        border-radius: 14px;
        padding: 0 18px;
        height: 46px;
        font-weight: 700;
        font-family: inherit;
        font-size: 14px;
        letter-spacing: 0.3px;
        cursor: pointer;
        transition: transform 0.1s ease, background 0.15s ease;
      }

      button.send:hover:not(:disabled) {
        background: #ffd866;
      }

      button.send:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      button.mic {
        background: var(--panel-2);
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 50%;
        width: 46px;
        height: 46px;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
        padding: 0;
      }

      button.mic:hover:not(:disabled) {
        background: var(--panel);
        border-color: rgba(245, 200, 66, 0.4);
      }

      button.mic:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      button.mic.listening {
        background: rgba(255, 140, 105, 0.15);
        border-color: var(--coral);
        color: var(--coral);
        box-shadow: 0 0 0 3px rgba(255, 140, 105, 0.2);
        animation: pulse-mic 1.5s ease-in-out infinite;
      }

      @keyframes pulse-mic {
        0%, 100% { box-shadow: 0 0 0 3px rgba(255, 140, 105, 0.2); }
        50% { box-shadow: 0 0 0 8px rgba(255, 140, 105, 0.08); }
      }

      button.mic.no-support {
        display: none;
      }

      .voice-status {
        display: none;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        background: rgba(255, 140, 105, 0.1);
        border: 1px solid rgba(255, 140, 105, 0.25);
        border-radius: 12px;
        margin-bottom: 6px;
        font-size: 13px;
        color: var(--coral);
        line-height: 1.4;
      }

      .voice-status.active {
        display: flex;
      }

      .voice-status .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--coral);
        flex-shrink: 0;
        animation: blink-dot 1s ease-in-out infinite;
      }

      @keyframes blink-dot {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      .voice-status .transcript-preview {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text);
        font-style: italic;
      }

      .voice-status .voice-hint {
        flex-shrink: 0;
        font-size: 11px;
        opacity: 0.7;
      }

      .correction .sayit {
        background: rgba(160, 160, 184, 0.08);
        color: var(--muted);
        font-style: italic;
      }

      form.hidden {
        display: none;
      }

      .error {
        color: var(--coral);
        font-size: 13px;
        padding: 8px 14px;
        border: 1px solid rgba(255, 140, 105, 0.4);
        background: rgba(255, 140, 105, 0.08);
        border-radius: 10px;
        align-self: center;
      }

      .gate {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        background: rgba(26, 26, 46, 0.45);
        backdrop-filter: blur(1px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        padding: 20px;
        /* Belt-and-braces: on a wide desktop the fixed container spans the
           whole viewport and flex centers horizontally AND vertically. */
        margin: 0;
      }

      .gate.hidden {
        display: none;
      }

      .gate-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 32px 28px 28px;
        width: 100%;
        max-width: 420px;
        /* Redundant with flex centering, but guarantees the card is
           horizontally centered even if a parent ever drops flex. */
        margin: 0 auto;
        text-align: center;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .gate-card h2 {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        margin: 0;
        color: var(--gold);
        font-size: 26px;
      }

      .gate-card h2 .accent {
        color: var(--coral);
        font-style: italic;
      }

      .gate-card p {
        color: var(--muted);
        font-size: 14px;
        margin: 0 0 10px;
      }

      .gate-card .field {
        display: block;
        width: 100%;
        text-align: left;
      }

      .gate-card label {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        color: var(--muted);
      }

      .gate-card input {
        width: 100%;
        display: block;
        box-sizing: border-box;
        background: var(--panel-2);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 12px;
        padding: 12px 14px;
        font-family: inherit;
        /* 16px so iOS doesn't auto-zoom when focusing the gate inputs. */
        font-size: 16px;
        outline: none;
        transition: border-color 0.15s ease;
      }

      .gate-card input:focus {
        border-color: rgba(245, 200, 66, 0.5);
      }

      .gate-card button {
        width: 100%;
        box-sizing: border-box;
        margin-top: 6px;
        background: var(--gold);
        color: #1a1a2e;
        border: none;
        border-radius: 12px;
        padding: 12px;
        font-weight: 700;
        font-family: inherit;
        font-size: 14px;
        letter-spacing: 0.3px;
        cursor: pointer;
      }

      .gate-card button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .gate-error {
        color: var(--coral);
        font-size: 13px;
        margin-top: 10px;
        min-height: 18px;
      }

      /* Inline pause panel — replaces the composer (input + send) after the
         student hits the 5-answer limit. The chat stays fully visible and
         scrollable so they can re-read the corrections while the timer
         counts down. */
      .pause-inline {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 14px 16px 10px;
        border-top: 1px solid var(--border);
        text-align: center;
      }

      .pause-inline.hidden {
        display: none;
      }

      .pause-inline-title {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        color: var(--gold);
        font-size: 16px;
        margin: 0;
      }

      .pause-timer {
        font-family: 'Playfair Display', serif;
        font-size: 32px;
        font-weight: 700;
        color: var(--coral);
        letter-spacing: 2px;
        font-variant-numeric: tabular-nums;
        margin: 2px 0;
      }

      .pause-sub {
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.3px;
        line-height: 1.4;
        max-width: 360px;
      }

      form.hidden {
        display: none;
      }

      /* Tiny pill shown near the header so the student always knows how
         many answers are left in the current window. */
      .session-counter {
        margin-top: 6px;
        font-size: 11px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: var(--muted);
      }
      .session-counter strong {
        color: var(--gold);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="gate hidden" id="gate" role="dialog" aria-modal="true" aria-labelledby="gateTitle">
      <form class="gate-card" id="gateForm" autocomplete="off">
        <h2 id="gateTitle">Ooh La <span class="accent">Langue</span></h2>
        <p>Enter your name and the password to start practicing.</p>
        <div class="field">
          <label for="gateName">Your name</label>
          <input
            type="text"
            id="gateName"
            placeholder="e.g. Kate"
            autocomplete="given-name"
            maxlength="40"
            required
          />
        </div>
        <div class="field">
          <label for="gatePassword">Password</label>
          <input
            type="password"
            id="gatePassword"
            placeholder="Password"
            autocomplete="current-password"
            required
          />
        </div>
        <button type="submit" id="gateSubmit">Enter</button>
        <div class="gate-error" id="gateError" aria-live="polite"></div>
      </form>
    </div>

    <div class="app">
      <header>
        <h1 class="logo">Ooh La <span class="accent">Langue</span></h1>
        <div class="tagline">
          <span>French conversation practice</span>
          <span class="badge">A1 · Débutant</span>
        </div>
        <div class="session-counter" id="sessionCounter" aria-live="polite"></div>
      </header>

      <div id="chat" aria-live="polite"></div>

      <div class="voice-status" id="voiceStatus">
        <span class="dot"></span>
        <span class="transcript-preview" id="voicePreview">Listening…</span>
        <span class="voice-hint">tap 🎤 to send</span>
      </div>
      <form id="form">
        <textarea
          id="input"
          placeholder="Écris ta réponse ici… (Enter to send · Shift+Enter for new line)"
          rows="1"
          autocomplete="off"
        ></textarea>
        <button type="button" class="mic" id="micBtn" title="Speak your answer">🎤</button>
        <button type="submit" class="send" id="sendBtn">Envoyer</button>
      </form>

      <div class="pause-inline hidden" id="pause" role="status" aria-live="polite">
        <p class="pause-inline-title">À tout à l'heure&nbsp;!</p>
        <div class="pause-timer" id="pauseTimer">03:00:00</div>
        <p class="pause-sub">
          Session limit reached. Review the corrections above — your input
          returns when the timer ends.
        </p>
      </div>
    </div>

    <script>
      const chatEl = document.getElementById('chat');
      const form = document.getElementById('form');
      const input = document.getElementById('input');
      const sendBtn = document.getElementById('sendBtn');
      const micBtn = document.getElementById('micBtn');

      const history = [];
      let busy = false;
      let lastInputWasVoice = false;

      // ---- Password + name gate ----
      const gateEl = document.getElementById('gate');
      const gateForm = document.getElementById('gateForm');
      const gateName = document.getElementById('gateName');
      const gatePassword = document.getElementById('gatePassword');
      const gatePasswordField = gatePassword.closest('.field');
      const gateIntro = gateEl.querySelector('p');
      const gateSubmit = document.getElementById('gateSubmit');
      const gateError = document.getElementById('gateError');
      const PASSWORD_KEY = 'oohlalangue_password';
      const NAME_KEY = 'oohlalangue_name';
      const PROFILE_KEY = 'oohlalangue_profile';
      const ANSWERS_KEY = 'oohlalangue_answers';
      const PAUSE_UNTIL_KEY = 'oohlalangue_pause_until';
      const ANSWERS_PER_WINDOW = 10;
      const PAUSE_MS = 3 * 60 * 60 * 1000; // 3 hours
      let passwordRequired = false;

      // ---- Session limit (5 answers → 3h pause, persisted across refreshes) ----
      const pauseEl = document.getElementById('pause');
      const pauseTimerEl = document.getElementById('pauseTimer');
      const sessionCounterEl = document.getElementById('sessionCounter');
      let pauseTick = null;

      function getAnswers() {
        try { return parseInt(localStorage.getItem(ANSWERS_KEY) || '0', 10) || 0; } catch (_e) { return 0; }
      }
      function setAnswers(n) {
        try { localStorage.setItem(ANSWERS_KEY, String(n)); } catch (_e) {}
      }
      function getPauseUntil() {
        try { return parseInt(localStorage.getItem(PAUSE_UNTIL_KEY) || '0', 10) || 0; } catch (_e) { return 0; }
      }
      function setPauseUntil(ts) {
        try {
          if (ts) localStorage.setItem(PAUSE_UNTIL_KEY, String(ts));
          else localStorage.removeItem(PAUSE_UNTIL_KEY);
        } catch (_e) {}
      }

      function formatDuration(ms) {
        const s = Math.max(0, Math.ceil(ms / 1000));
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        const pad = (n) => String(n).padStart(2, '0');
        return `${pad(h)}:${pad(m)}:${pad(sec)}`;
      }

      function updateSessionCounter() {
        if (!sessionCounterEl) return;
        // Hide while a pause is active — the inline pause panel already
        // shows a live timer, no need to duplicate the info in the header.
        if (getPauseUntil() > Date.now()) {
          sessionCounterEl.innerHTML = '';
          return;
        }
        const remaining = Math.max(0, ANSWERS_PER_WINDOW - getAnswers());
        sessionCounterEl.innerHTML =
          remaining > 0 && remaining < ANSWERS_PER_WINDOW
            ? `<strong>${remaining}</strong> answer${remaining === 1 ? '' : 's'} left in this session`
            : '';
      }

      function showPause() {
        pauseEl.classList.remove('hidden');
        form.classList.add('hidden');
        voiceStatus.classList.remove('active');
        sendBtn.disabled = true;
        micBtn.disabled = true;
        input.disabled = true;
        scrollToBottom();
      }
      function hidePause() {
        pauseEl.classList.add('hidden');
        form.classList.remove('hidden');
        sendBtn.disabled = false;
        micBtn.disabled = false;
        input.disabled = false;
      }

      function onPauseEnded() {
        if (pauseTick) { clearInterval(pauseTick); pauseTick = null; }
        setPauseUntil(0);
        setAnswers(0);
        updateSessionCounter();
        hidePause();
        // If we have an in-memory conversation, just unlock the composer —
        // the student can type whatever they want next and the teacher will
        // correct + ask a fresh question. If history is empty (they sat
        // through the whole pause with a refresh, losing memory), kick off
        // a new greeting so they aren't staring at a blank chat.
        if (history.length === 0) {
          send('Start!', { display: false });
        } else {
          try { input.focus(); } catch (_e) {}
        }
      }

      // Returns true if we're currently paused (and arms the UI).
      function enforcePauseIfActive() {
        const until = getPauseUntil();
        if (!until) return false;
        const remaining = until - Date.now();
        if (remaining <= 0) {
          onPauseEnded();
          return false;
        }
        showPause();
        pauseTimerEl.textContent = formatDuration(remaining);
        if (pauseTick) clearInterval(pauseTick);
        pauseTick = setInterval(() => {
          const left = getPauseUntil() - Date.now();
          if (left <= 0) {
            onPauseEnded();
          } else {
            pauseTimerEl.textContent = formatDuration(left);
          }
        }, 1000);
        return true;
      }

      function recordAnswerAndMaybePause() {
        const next = getAnswers() + 1;
        setAnswers(next);
        updateSessionCounter();
        if (next >= ANSWERS_PER_WINDOW) {
          setPauseUntil(Date.now() + PAUSE_MS);
          enforcePauseIfActive();
          return true;
        }
        return false;
      }

      // ---- Learned-profile storage (localStorage) ----
      function getProfile() {
        try {
          const raw = localStorage.getItem(PROFILE_KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed.filter((s) => typeof s === 'string') : [];
        } catch (_e) { return []; }
      }
      function setProfile(list) {
        try { localStorage.setItem(PROFILE_KEY, JSON.stringify(list.slice(0, 40))); } catch (_e) {}
      }
      function addProfileFacts(newFacts) {
        if (!newFacts || !newFacts.length) return;
        const existing = getProfile();
        const seen = new Set(existing.map((s) => s.toLowerCase()));
        for (const f of newFacts) {
          const clean = String(f).replace(/[`<>{}\[\]"]/g, '').trim().slice(0, 120);
          if (!clean) continue;
          const key = clean.toLowerCase();
          if (seen.has(key)) continue;
          seen.add(key);
          existing.push(clean);
        }
        // Cap: keep the most recent 40 facts.
        const capped = existing.slice(-40);
        setProfile(capped);
      }

      // Extract and strip hidden <note>...</note> block from teacher text.
      // Returns { visible, facts[] }.
      function extractNote(text) {
        const re = /<note>([\s\S]*?)<\/note>/i;
        const m = text.match(re);
        if (!m) return { visible: text, facts: [] };
        const raw = m[1] || '';
        const facts = raw
          .split('|')
          .map((s) => s.trim())
          .filter(Boolean);
        const visible = text.replace(re, '').replace(/\n{3,}/g, '\n\n').trim();
        return { visible, facts };
      }

      // ---- Voice / Speech (browser-native APIs, zero cost) ----
      const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
      let recognition = null;
      let isListening = false;

      if (!SpeechRecognitionAPI) micBtn.classList.add('no-support');

      // --- SpeechRecognition (input) ---
      const voiceStatus = document.getElementById('voiceStatus');
      const voicePreview = document.getElementById('voicePreview');
      let finalTranscript = '';
      let silenceTimer = null;
      const SILENCE_TIMEOUT = 2000;

      function showVoiceStatus(show) {
        voiceStatus.classList.toggle('active', show);
      }

      function updatePreview(text) {
        voicePreview.textContent = text || 'Listening…';
      }

      function stopAndSend() {
        if (!isListening) return;
        clearTimeout(silenceTimer);
        isListening = false;
        try { recognition.stop(); } catch (_) {}
        micBtn.classList.remove('listening');
        showVoiceStatus(false);
        const text = finalTranscript.trim();
        finalTranscript = '';
        if (text) {
          input.value = '';
          autoresize();
          lastInputWasVoice = true;
          send(text, { display: true, voice: true });
        }
      }

      function resetSilenceTimer() {
        clearTimeout(silenceTimer);
        silenceTimer = setTimeout(stopAndSend, SILENCE_TIMEOUT);
      }

      function startListening() {
        if (!SpeechRecognitionAPI || busy) return;
        if (isListening) { stopAndSend(); return; }
        if (!recognition) {
          recognition = new SpeechRecognitionAPI();
          recognition.lang = 'fr-FR';
          recognition.interimResults = true;
          recognition.maxAlternatives = 1;
          recognition.continuous = true;

          recognition.addEventListener('result', (e) => {
            let interim = '';
            finalTranscript = '';
            for (let i = 0; i < e.results.length; i++) {
              if (e.results[i].isFinal) {
                finalTranscript += e.results[i][0].transcript;
              } else {
                interim += e.results[i][0].transcript;
              }
            }
            updatePreview(finalTranscript + interim || 'Listening…');
            resetSilenceTimer();
          });

          recognition.addEventListener('end', () => {
            if (isListening) {
              // Browser stopped unexpectedly (e.g. silence) — send what we have
              isListening = false;
              clearTimeout(silenceTimer);
              micBtn.classList.remove('listening');
              showVoiceStatus(false);
              const text = finalTranscript.trim();
              finalTranscript = '';
              if (text) {
                input.value = '';
                autoresize();
                lastInputWasVoice = true;
                send(text, { display: true, voice: true });
              }
            }
          });

          recognition.addEventListener('error', (e) => {
            clearTimeout(silenceTimer);
            isListening = false;
            micBtn.classList.remove('listening');
            showVoiceStatus(false);
            finalTranscript = '';
            if (e.error !== 'no-speech' && e.error !== 'aborted') {
              showError('Voice error: ' + e.error);
            }
          });
        }
        finalTranscript = '';
        isListening = true;
        micBtn.classList.add('listening');
        updatePreview('Listening…');
        showVoiceStatus(true);
        recognition.start();
        resetSilenceTimer();
      }

      micBtn.addEventListener('click', startListening);

      // --- SpeechSynthesis (output) ---
      // Strip symbols, emoji, and markdown so the TTS engine reads only
      // natural spoken text — no "asterisk", "exclamation mark at sign", etc.
      function cleanForSpeech(raw) {
        let s = raw;
        s = s.replace(/\*+/g, '');
        s = s.replace(/#+ */g, '');
        s = s.replace(/[_~`>|]/g, '');
        s = s.replace(/\[([^\]]*)\]\([^)]*\)/g, '$1');
        // Strip emoji (broad Unicode ranges: dingbats, emoticons, symbols,
        // supplemental, flags, skin-tone modifiers, variation selectors).
        s = s.replace(/[☀-➿︀-️\u{1F000}-\u{1FAFF}\u{E0020}-\u{E007F}‍]/gu, '');
        s = s.replace(/→/g, ', ');
        s = s.replace(/—/g, ', ');
        s = s.replace(/[(){}\[\]<>]/g, '');
        s = s.replace(/ {2,}/g, ' ');
        return s.trim();
      }

      function speakFrench(text) {
        if (!text || !window.speechSynthesis) return;
        const clean = cleanForSpeech(text);
        if (!clean) return;
        window.speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance(clean);
        utt.lang = 'fr-FR';
        utt.rate = 0.85;
        const voices = window.speechSynthesis.getVoices();
        const fr = voices.find((v) => v.lang === 'fr-FR') ||
                   voices.find((v) => v.lang.startsWith('fr'));
        if (fr) utt.voice = fr;
        window.speechSynthesis.speak(utt);
      }

      // Preload voices (Chrome loads them async).
      if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.addEventListener('voiceschanged', () => {});
      }

      // Extract the French parts of a teacher reply for TTS — the corrected
      // sentence and the follow-up question. Skips English feedback.
      function extractFrenchForTTS(text) {
        const parsed = parseTeacherReply(text);
        if (!parsed.hasMarkers) return text;
        const parts = [];
        const corrected = parsed.corrections.find((c) => c.type === 'corrected');
        if (corrected) parts.push(corrected.text);
        if (parsed.question) parts.push(parsed.question);
        return parts.join('. ') || text;
      }

      function configureGateForRequirement(required) {
        passwordRequired = required;
        gatePasswordField.style.display = required ? '' : 'none';
        gatePassword.required = required;
        gateIntro.textContent = required
          ? 'Enter your name and the password to start practicing.'
          : 'What should we call you?';
      }

      function getStoredPassword() {
        try { return localStorage.getItem(PASSWORD_KEY) || ''; } catch (_e) { return ''; }
      }
      function setStoredPassword(v) {
        try { v ? localStorage.setItem(PASSWORD_KEY, v) : localStorage.removeItem(PASSWORD_KEY); } catch (_e) {}
      }
      function getStoredName() {
        try { return localStorage.getItem(NAME_KEY) || ''; } catch (_e) { return ''; }
      }
      function setStoredName(v) {
        try { v ? localStorage.setItem(NAME_KEY, v) : localStorage.removeItem(NAME_KEY); } catch (_e) {}
      }

      function authHeaders() {
        const pw = getStoredPassword();
        return pw ? { 'x-app-password': pw } : {};
      }

      function showGate(errorText) {
        gateEl.classList.remove('hidden');
        gateError.textContent = errorText || '';
        gatePassword.value = '';
        gateName.value = getStoredName();
        setTimeout(() => (gateName.value ? gatePassword : gateName).focus(), 50);
      }
      function hideGate() {
        gateEl.classList.add('hidden');
        gateError.textContent = '';
      }

      async function verifyPassword(pw) {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-app-password': pw },
          body: JSON.stringify({})
        });
        return res.ok;
      }

      gateForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = gateName.value.trim().slice(0, 40);
        const pw = gatePassword.value.trim();
        if (!name) return;
        if (passwordRequired && !pw) return;
        gateSubmit.disabled = true;
        gateError.textContent = '';
        try {
          if (passwordRequired) {
            const ok = await verifyPassword(pw);
            if (!ok) {
              showGate('Incorrect password');
              return;
            }
            setStoredPassword(pw);
          }
          setStoredName(name);
          hideGate();
          // Start the conversation now that we're authenticated and named.
          send('Start!', { display: false });
        } catch (err) {
          showGate('Network error: ' + (err && err.message ? err.message : err));
        } finally {
          gateSubmit.disabled = false;
        }
      });

      async function bootstrapAuth() {
        let required = false;
        try {
          const res = await fetch('/api/auth');
          const data = await res.json();
          required = Boolean(data && data.required);
        } catch (_e) {
          // If we can't reach the server, fall through and let /api/chat fail visibly.
        }

        configureGateForRequirement(required);
        updateSessionCounter();

        // If we're mid-pause, just show the timer and stop — no auth flow,
        // no new conversation started until the pause ends.
        if (enforcePauseIfActive()) return;

        // We always need a name to personalize the conversation.
        const haveName = Boolean(getStoredName());
        const havePassword = Boolean(getStoredPassword());

        if (!required && haveName) {
          send('Start!', { display: false });
          return;
        }

        if (required && haveName && havePassword && (await verifyPassword(getStoredPassword()))) {
          send('Start!', { display: false });
          return;
        }

        if (!havePassword) setStoredPassword('');
        showGate();
      }

      function mdToHtml(text) {
        let s = text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
        s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
        s = s.replace(/\n/g, '<br>');
        return s;
      }

      function scrollToBottom() {
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      function makeRow(role) {
        const row = document.createElement('div');
        row.className = 'row ' + role;
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = role === 'teacher' ? '🇫🇷' : '📝';
        const content = document.createElement('div');
        content.className = 'content';
        row.appendChild(avatar);
        row.appendChild(content);
        return { row, content };
      }

      function addStudentMessage(text) {
        const { row, content } = makeRow('student');
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;
        content.appendChild(bubble);
        chatEl.appendChild(row);
        scrollToBottom();
      }

      function showTyping() {
        const { row, content } = makeRow('teacher');
        row.id = 'typing-row';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        const typing = document.createElement('div');
        typing.className = 'typing';
        typing.innerHTML = '<span></span><span></span><span></span>';
        bubble.appendChild(typing);
        content.appendChild(bubble);
        chatEl.appendChild(row);
        scrollToBottom();
      }

      function removeTyping() {
        const existing = document.getElementById('typing-row');
        if (existing) existing.remove();
      }

      function showError(msg) {
        const el = document.createElement('div');
        el.className = 'error';
        el.textContent = msg;
        chatEl.appendChild(el);
        scrollToBottom();
      }

      // Parse teacher reply into intro / correction blocks / next question.
      function parseTeacherReply(text) {
        const markers = [
          { key: 'good', regex: /^✅\s*GOOD:\s*/i },
          { key: 'fix', regex: /^🔧\s*FIX:\s*/i },
          { key: 'corrected', regex: /^💬\s*CORRECTED:\s*/i },
          { key: 'sayit', regex: /^🗣️\s*SAY IT:\s*/i }
        ];

        const lines = text.split(/\r?\n/);
        const introLines = [];
        const correctionLines = []; // {type, text}
        const questionLines = [];

        let stage = 'intro'; // 'intro' | 'correction' | 'question'
        let sawCorrected = false;

        for (const raw of lines) {
          const line = raw.trim();
          let matched = null;
          for (const m of markers) {
            if (m.regex.test(line)) {
              matched = m;
              break;
            }
          }

          if (matched) {
            const content = line.replace(matched.regex, '').trim();
            correctionLines.push({ type: matched.key, text: content });
            stage = 'correction';
            if (matched.key === 'corrected' || matched.key === 'sayit') sawCorrected = true;
            continue;
          }

          if (stage === 'intro') {
            if (line) introLines.push(line);
          } else if (stage === 'correction') {
            if (sawCorrected) {
              if (line) {
                stage = 'question';
                questionLines.push(line);
              }
            } else if (line && correctionLines.length) {
              // continuation of previous correction line
              correctionLines[correctionLines.length - 1].text += ' ' + line;
            }
          } else if (stage === 'question') {
            if (line) questionLines.push(line);
          }
        }

        return {
          intro: introLines.join('\n').trim(),
          corrections: correctionLines,
          question: questionLines.join('\n').trim(),
          hasMarkers: correctionLines.length > 0
        };
      }

      function renderTeacherReply(text) {
        const { row, content } = makeRow('teacher');
        const parsed = parseTeacherReply(text);

        if (!parsed.hasMarkers) {
          const bubble = document.createElement('div');
          bubble.className = 'bubble';
          bubble.innerHTML = mdToHtml(text);
          content.appendChild(bubble);
          chatEl.appendChild(row);
          scrollToBottom();
          return;
        }

        if (parsed.intro) {
          const bubble = document.createElement('div');
          bubble.className = 'bubble intro';
          bubble.innerHTML = mdToHtml(parsed.intro);
          content.appendChild(bubble);
        }

        if (parsed.corrections.length) {
          const card = document.createElement('div');
          card.className = 'correction';
          const labelMap = {
            good: { cls: 'good', icon: '✅', label: 'Good' },
            fix: { cls: 'fix', icon: '🔧', label: 'Fix' },
            corrected: { cls: 'corrected', icon: '💬', label: 'Corrected' },
            sayit: { cls: 'sayit', icon: '🗣️', label: 'Say it' }
          };
          for (const c of parsed.corrections) {
            const meta = labelMap[c.type];
            if (!meta) continue;
            const section = document.createElement('div');
            section.className = 'section ' + meta.cls;
            const icon = document.createElement('span');
            icon.className = 'icon';
            icon.textContent = meta.icon;
            const body = document.createElement('span');
            const label = document.createElement('span');
            label.className = 'label';
            label.textContent = meta.label;
            body.appendChild(label);
            const textSpan = document.createElement('span');
            textSpan.innerHTML = mdToHtml(c.text);
            body.appendChild(textSpan);
            section.appendChild(icon);
            section.appendChild(body);
            card.appendChild(section);
          }
          content.appendChild(card);
        }

        if (parsed.question) {
          const bubble = document.createElement('div');
          bubble.className = 'bubble question';
          bubble.innerHTML = mdToHtml(parsed.question);
          content.appendChild(bubble);
        }

        chatEl.appendChild(row);
        scrollToBottom();
      }

      async function send(userText, { display = true, voice = false } = {}) {
        if (busy) return;
        // Don't allow anything through while a pause is active.
        if (enforcePauseIfActive()) return;
        busy = true;
        sendBtn.disabled = true;
        micBtn.disabled = true;

        if (display) addStudentMessage(userText);

        history.push({ role: 'user', content: userText });
        showTyping();

        // If this send is the 5th (and final) answer of the current window,
        // tell the server to correct but NOT ask a new question — otherwise
        // the teacher would spin up a question the student gets locked out
        // of for 3 hours.
        const willTriggerPause = display && getAnswers() + 1 >= ANSWERS_PER_WINDOW;

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...authHeaders() },
            body: JSON.stringify({
              messages: history,
              name: getStoredName(),
              profile: getProfile(),
              skipQuestion: willTriggerPause,
              voiceMode: voice
            })
          });
          const data = await res.json();
          removeTyping();

          if (res.status === 401) {
            setStoredPassword('');
            history.pop();
            showGate('Session expired — please re-enter the password');
            return;
          }

          if (!res.ok) {
            const msg = (data && (data.error?.message || data.error)) || 'Request failed';
            showError(typeof msg === 'string' ? msg : JSON.stringify(msg));
            history.pop();
            return;
          }

          const rawText = (data && data.text) || '';
          const { visible, facts } = extractNote(rawText);
          if (facts.length) addProfileFacts(facts);
          history.push({ role: 'assistant', content: visible });
          renderTeacherReply(visible);

          if (voice) {
            const frenchText = extractFrenchForTTS(visible);
            speakFrench(frenchText);
          }

          if (display) {
            recordAnswerAndMaybePause();
          }
        } catch (err) {
          removeTyping();
          showError('Network error: ' + (err && err.message ? err.message : err));
          history.pop();
        } finally {
          busy = false;
          lastInputWasVoice = false;
          if (!enforcePauseIfActive()) {
            sendBtn.disabled = false;
            micBtn.disabled = false;
            input.focus();
          }
        }
      }

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text || busy) return;
        input.value = '';
        autoresize();
        send(text);
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          form.requestSubmit();
        }
      });

      function autoresize() {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 160) + 'px';
      }
      input.addEventListener('input', autoresize);

      // Mobile keyboard handling.
      //
      // iOS Safari doesn't shrink the layout viewport when the keyboard
      // opens; it shrinks the *visual* viewport and then tries to scroll
      // the document so the focused input is visible. On short pages
      // (few chat messages) that scroll pushes the teacher's question
      // above the visible area.
      //
      // Fix: size .app from window.visualViewport.height via a CSS var,
      // and re-pin the chat to the bottom after any keyboard/resize
      // event. Combined with `overflow: hidden` on html/body this keeps
      // everything visible without the document ever scrolling.
      function syncViewportHeight() {
        const h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
        document.documentElement.style.setProperty('--vvh', h + 'px');
      }

      function pinToBottom() {
        syncViewportHeight();
        // rAF + a short delay so we run after the keyboard animation.
        requestAnimationFrame(() => {
          setTimeout(() => {
            syncViewportHeight();
            scrollToBottom();
            // Make sure the document itself never scrolled.
            window.scrollTo(0, 0);
          }, 120);
        });
      }

      input.addEventListener('focus', pinToBottom);
      input.addEventListener('blur', syncViewportHeight);
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', pinToBottom);
        window.visualViewport.addEventListener('scroll', () => window.scrollTo(0, 0));
      } else {
        window.addEventListener('resize', pinToBottom);
      }
      syncViewportHeight();

      // Check whether a password is required, prompt if so, then kick off
      // the teacher's opening greeting.
      bootstrapAuth();
    </script>
  </body>
</html>
