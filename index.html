<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ooh La Langue — French conversation practice</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%231a1a2e'/><text x='50%' y='54%' font-family='Playfair Display, serif' font-size='40' font-weight='700' text-anchor='middle' dominant-baseline='middle' fill='%23f5c842'>O</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Playfair+Display:ital,wght@0,600;0,700;1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #1a1a2e;
        --panel: #22223a;
        --panel-2: #2a2a45;
        --gold: #f5c842;
        --coral: #ff8c69;
        --green: #7bd88f;
        --text: #f1f1f5;
        --muted: #a0a0b8;
        --bubble-teacher: #2e2e4d;
        --bubble-student: #3a2e4d;
        --border: rgba(255, 255, 255, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'DM Sans', system-ui, -apple-system, Segoe UI, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 820px;
        margin: 0 auto;
        padding: 20px 16px 12px;
      }

      header {
        text-align: center;
        padding: 8px 0 18px;
        border-bottom: 1px solid var(--border);
      }

      .logo {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        font-size: 42px;
        letter-spacing: 0.5px;
        color: var(--gold);
        margin: 0;
        line-height: 1.1;
      }

      .logo .accent {
        color: var(--coral);
        font-style: italic;
      }

      .tagline {
        margin-top: 8px;
        font-size: 14px;
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .badge {
        background: rgba(245, 200, 66, 0.12);
        color: var(--gold);
        border: 1px solid rgba(245, 200, 66, 0.35);
        border-radius: 999px;
        padding: 3px 10px;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.3px;
      }

      #chat {
        flex: 1;
        overflow-y: auto;
        padding: 20px 4px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        scroll-behavior: smooth;
      }

      #chat::-webkit-scrollbar {
        width: 8px;
      }
      #chat::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 8px;
      }

      .row {
        display: flex;
        gap: 10px;
        align-items: flex-end;
        max-width: 90%;
      }

      .row.teacher {
        align-self: flex-start;
      }

      .row.student {
        align-self: flex-end;
        flex-direction: row-reverse;
      }

      .avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--panel-2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
        border: 1px solid var(--border);
      }

      .bubble {
        background: var(--bubble-teacher);
        padding: 12px 16px;
        border-radius: 18px;
        border: 1px solid var(--border);
        line-height: 1.5;
        font-size: 15px;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      .row.teacher .bubble {
        border-bottom-left-radius: 4px;
      }

      .row.student .bubble {
        background: var(--bubble-student);
        border-bottom-right-radius: 4px;
      }

      .correction {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        margin-top: 8px;
      }

      .correction .section {
        display: flex;
        gap: 10px;
        padding: 10px 14px;
        align-items: flex-start;
        font-size: 14.5px;
        line-height: 1.5;
        border-top: 1px solid var(--border);
      }

      .correction .section:first-child {
        border-top: none;
      }

      .correction .section .icon {
        font-size: 16px;
        margin-top: 1px;
      }

      .correction .good {
        background: rgba(123, 216, 143, 0.08);
        color: var(--green);
      }

      .correction .fix {
        background: rgba(255, 140, 105, 0.08);
        color: var(--coral);
      }

      .correction .corrected {
        background: rgba(245, 200, 66, 0.08);
        color: var(--gold);
        font-style: italic;
      }

      .correction .label {
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-size: 11px;
        opacity: 0.8;
        margin-right: 6px;
      }

      .intro {
        margin-bottom: 2px;
      }

      .question {
        margin-top: 10px;
        font-weight: 500;
      }

      .typing {
        display: inline-flex;
        gap: 4px;
        align-items: center;
        padding: 14px 16px;
      }

      .typing span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
        animation: blink 1.3s infinite ease-in-out;
      }

      .typing span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes blink {
        0%, 80%, 100% {
          opacity: 0.3;
          transform: scale(0.85);
        }
        40% {
          opacity: 1;
          transform: scale(1);
        }
      }

      form {
        display: flex;
        gap: 10px;
        padding: 12px 4px 4px;
        border-top: 1px solid var(--border);
        align-items: flex-end;
      }

      textarea {
        flex: 1;
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 14px;
        padding: 12px 14px;
        font-family: inherit;
        font-size: 15px;
        line-height: 1.4;
        resize: none;
        min-height: 46px;
        max-height: 160px;
        outline: none;
        transition: border-color 0.15s ease;
      }

      textarea:focus {
        border-color: rgba(245, 200, 66, 0.45);
      }

      button.send {
        background: var(--gold);
        color: #1a1a2e;
        border: none;
        border-radius: 14px;
        padding: 0 18px;
        height: 46px;
        font-weight: 700;
        font-family: inherit;
        font-size: 14px;
        letter-spacing: 0.3px;
        cursor: pointer;
        transition: transform 0.1s ease, background 0.15s ease;
      }

      button.send:hover:not(:disabled) {
        background: #ffd866;
      }

      button.send:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .error {
        color: var(--coral);
        font-size: 13px;
        padding: 8px 14px;
        border: 1px solid rgba(255, 140, 105, 0.4);
        background: rgba(255, 140, 105, 0.08);
        border-radius: 10px;
        align-self: center;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1 class="logo">Ooh La <span class="accent">Langue</span></h1>
        <div class="tagline">
          <span>French conversation practice</span>
          <span class="badge">A1 · Débutant</span>
        </div>
      </header>

      <div id="chat" aria-live="polite"></div>

      <form id="form">
        <textarea
          id="input"
          placeholder="Écris ta réponse ici… (Enter to send · Shift+Enter for new line)"
          rows="1"
          autocomplete="off"
        ></textarea>
        <button type="submit" class="send" id="sendBtn">Envoyer</button>
      </form>
    </div>

    <script>
      const chatEl = document.getElementById('chat');
      const form = document.getElementById('form');
      const input = document.getElementById('input');
      const sendBtn = document.getElementById('sendBtn');

      const history = [];
      let busy = false;

      function scrollToBottom() {
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      function makeRow(role) {
        const row = document.createElement('div');
        row.className = 'row ' + role;
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = role === 'teacher' ? '🇫🇷' : '📝';
        const content = document.createElement('div');
        content.className = 'content';
        row.appendChild(avatar);
        row.appendChild(content);
        return { row, content };
      }

      function addStudentMessage(text) {
        const { row, content } = makeRow('student');
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;
        content.appendChild(bubble);
        chatEl.appendChild(row);
        scrollToBottom();
      }

      function showTyping() {
        const { row, content } = makeRow('teacher');
        row.id = 'typing-row';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        const typing = document.createElement('div');
        typing.className = 'typing';
        typing.innerHTML = '<span></span><span></span><span></span>';
        bubble.appendChild(typing);
        content.appendChild(bubble);
        chatEl.appendChild(row);
        scrollToBottom();
      }

      function removeTyping() {
        const existing = document.getElementById('typing-row');
        if (existing) existing.remove();
      }

      function showError(msg) {
        const el = document.createElement('div');
        el.className = 'error';
        el.textContent = msg;
        chatEl.appendChild(el);
        scrollToBottom();
      }

      // Parse teacher reply into intro / correction blocks / next question.
      function parseTeacherReply(text) {
        const markers = [
          { key: 'good', regex: /^✅\s*GOOD:\s*/i },
          { key: 'fix', regex: /^🔧\s*FIX:\s*/i },
          { key: 'corrected', regex: /^💬\s*CORRECTED:\s*/i }
        ];

        const lines = text.split(/\r?\n/);
        const introLines = [];
        const correctionLines = []; // {type, text}
        const questionLines = [];

        let stage = 'intro'; // 'intro' | 'correction' | 'question'
        let sawCorrected = false;

        for (const raw of lines) {
          const line = raw.trim();
          let matched = null;
          for (const m of markers) {
            if (m.regex.test(line)) {
              matched = m;
              break;
            }
          }

          if (matched) {
            const content = line.replace(matched.regex, '').trim();
            correctionLines.push({ type: matched.key, text: content });
            stage = 'correction';
            if (matched.key === 'corrected') sawCorrected = true;
            continue;
          }

          if (stage === 'intro') {
            if (line) introLines.push(line);
          } else if (stage === 'correction') {
            if (sawCorrected) {
              if (line) {
                stage = 'question';
                questionLines.push(line);
              }
            } else if (line && correctionLines.length) {
              // continuation of previous correction line
              correctionLines[correctionLines.length - 1].text += ' ' + line;
            }
          } else if (stage === 'question') {
            if (line) questionLines.push(line);
          }
        }

        return {
          intro: introLines.join('\n').trim(),
          corrections: correctionLines,
          question: questionLines.join('\n').trim(),
          hasMarkers: correctionLines.length > 0
        };
      }

      function renderTeacherReply(text) {
        const { row, content } = makeRow('teacher');
        const parsed = parseTeacherReply(text);

        if (!parsed.hasMarkers) {
          const bubble = document.createElement('div');
          bubble.className = 'bubble';
          bubble.textContent = text;
          content.appendChild(bubble);
          chatEl.appendChild(row);
          scrollToBottom();
          return;
        }

        if (parsed.intro) {
          const bubble = document.createElement('div');
          bubble.className = 'bubble intro';
          bubble.textContent = parsed.intro;
          content.appendChild(bubble);
        }

        if (parsed.corrections.length) {
          const card = document.createElement('div');
          card.className = 'correction';
          const labelMap = {
            good: { cls: 'good', icon: '✅', label: 'Good' },
            fix: { cls: 'fix', icon: '🔧', label: 'Fix' },
            corrected: { cls: 'corrected', icon: '💬', label: 'Corrected' }
          };
          for (const c of parsed.corrections) {
            const meta = labelMap[c.type];
            if (!meta) continue;
            const section = document.createElement('div');
            section.className = 'section ' + meta.cls;
            const icon = document.createElement('span');
            icon.className = 'icon';
            icon.textContent = meta.icon;
            const body = document.createElement('span');
            const label = document.createElement('span');
            label.className = 'label';
            label.textContent = meta.label;
            body.appendChild(label);
            body.appendChild(document.createTextNode(c.text));
            section.appendChild(icon);
            section.appendChild(body);
            card.appendChild(section);
          }
          content.appendChild(card);
        }

        if (parsed.question) {
          const bubble = document.createElement('div');
          bubble.className = 'bubble question';
          bubble.textContent = parsed.question;
          content.appendChild(bubble);
        }

        chatEl.appendChild(row);
        scrollToBottom();
      }

      async function send(userText, { display = true } = {}) {
        if (busy) return;
        busy = true;
        sendBtn.disabled = true;

        if (display) addStudentMessage(userText);

        history.push({ role: 'user', content: userText });
        showTyping();

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: history })
          });
          const data = await res.json();
          removeTyping();

          if (!res.ok) {
            const msg = (data && (data.error?.message || data.error)) || 'Request failed';
            showError(typeof msg === 'string' ? msg : JSON.stringify(msg));
            // roll back the user turn since there's no assistant reply
            history.pop();
            return;
          }

          const text = (data && data.text) || '';
          history.push({ role: 'assistant', content: text });
          renderTeacherReply(text);
        } catch (err) {
          removeTyping();
          showError('Network error: ' + (err && err.message ? err.message : err));
          history.pop();
        } finally {
          busy = false;
          sendBtn.disabled = false;
          input.focus();
        }
      }

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text || busy) return;
        input.value = '';
        autoresize();
        send(text);
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          form.requestSubmit();
        }
      });

      function autoresize() {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 160) + 'px';
      }
      input.addEventListener('input', autoresize);

      // Kick off: trigger the teacher's opening greeting.
      send('Start!', { display: false });
    </script>
  </body>
</html>
